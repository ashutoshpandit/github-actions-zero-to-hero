#this is a workflow name
name: Hello Workflow
# runs on a trigger
on:
  push:
    branches: [main]

#these are jobs inside the workflow
jobs: 
  # this is the name of job
  greet:
    # this is a github runner
    runs-on: ubuntu-latest
    steps:
      - name: Say Hello to users
        run: echo "Hello Dosto"
       
      - name: say hello to username
        run: echo "Hello $USER"
