# This is workflow name
name: Hello

# runs on a trigger
on: 
  push:
    branches: [main]

# These are jobs inside the workflow
jobs:

  # this is the name of job
  greet:
    # this is github runner
    runs-on: ubuntu-latest
    steps:
      - name: say hello to users
        run: echo "Hello Dosto" 

      - name: say hello to UserName
        run: echo "Hello Ashutosh" 
  details:
    runs-on: ubuntu-lates
    steps:
      - name: shows the version of docker and python
        run: docker --version $$ python --version
